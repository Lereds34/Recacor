name: IndexNow — Notifier Google & Bing après déploiement

on:
  push:
    branches: [main]

jobs:
  indexnow:
    name: Soumettre les URLs à IndexNow
    runs-on: ubuntu-latest
    # Attendre 2 min que Vercel déploie avant de soumettre
    steps:
      - uses: actions/checkout@v4

      - name: Attendre le déploiement Vercel (2 min)
        run: sleep 120

      - name: Soumettre à IndexNow
        run: node scripts/indexnow.mjs
